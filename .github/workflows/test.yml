name: Test

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt 2>$null
        pip install pyflakes

    - name: Syntax check all Python files
      shell: pwsh
      run: |
        $bad = @()
        Get-ChildItem -Recurse -Filter *.py | Where-Object { $_.FullName -notmatch '\\temp\\' } | ForEach-Object {
          $result = python -m py_compile $_.FullName 2>&1
          if ($LASTEXITCODE -ne 0) {
            $bad += $_.FullName
            Write-Host "FAIL: $($_.FullName)"
            Write-Host $result
          }
        }
        if ($bad.Count -gt 0) {
          throw "$($bad.Count) file(s) failed syntax check"
        }
        Write-Host "All files OK"

    - name: Check for missing imports
      shell: pwsh
      run: |
        Get-ChildItem -Recurse -Filter *.py | Where-Object { $_.FullName -notmatch '\\temp\\' -and $_.FullName -notmatch '\\.github\\' } | ForEach-Object {
          $r = python -c "import ast; ast.parse(open('$($_.FullName)').read())" 2>&1
          if ($LASTEXITCODE -ne 0) { Write-Host "AST FAIL: $($_.FullName)"; Write-Host $r }
        }
        Write-Host "AST check done"

    - name: Run feature smoke tests
      shell: pwsh
      run: |
        python project\temp\smoke_test.py
